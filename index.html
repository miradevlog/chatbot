<!doctype html>
<html>
  <head>
    <title>Chatbot</title>

    <!-- Tailwind CSS v4 (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background: radial-gradient(circle at top, #2a0a4a, #0a0614);
      }

      /* smooth scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #7c3aed55;
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center text-white">

    <div class="js-container w-full flex justify-center"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          setInputText("");
        }

        return (
          <div className="p-4 flex gap-2 border-t border-white/10">
            <input
              type="text"
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="flex-1 px-4 py-2 rounded-xl bg-white/10 backdrop-blur-md border border-white/10 focus:outline-none focus:ring-2 focus:ring-violet-500 transition"
            />

            <button
              onClick={sendMessage}
              className="px-5 py-2 rounded-xl bg-violet-600 hover:bg-violet-500 active:scale-95 transition shadow-lg shadow-violet-500/30"
            >
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div
            className={
              "flex items-center gap-2 mb-3 " +
              (sender === "robot" ? "justify-start" : "justify-end")
            }
          >

            {sender === "robot" && (
              <img src="robot.png" width="40" className="drop-shadow-lg" />
            )}

            <div
              className={
                "px-4 py-2 max-w-[70%] text-sm rounded-2xl shadow-md backdrop-blur-md border transition hover:scale-[1.02] " +
                (sender === "robot"
                  ? "bg-white/10 border-white/10 rounded-bl-sm"
                  : "bg-violet-600 text-white rounded-br-sm")
              }
            >
              {message}
            </div>

            {sender === "user" && (
              <img src="user.png" width="40" className="drop-shadow-lg" />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        return (
          <div className="h-[420px] overflow-y-auto p-4">
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          { message: "hello chatbot", sender: "user", id: "id1" },
          { message: "Hello! How can I help you?", sender: "robot", id: "id2" },
          { message: "Can you get me today's date?", sender: "user", id: "id3" },
          { message: "Sure! Today's date is June 1, 2024.", sender: "robot", id: "id4" },
        ]);

        return (
          <div className="w-full max-w-2xl mx-auto mt-10
                          bg-white/5 border border-white/10
                          backdrop-blur-xl rounded-2xl shadow-2xl overflow-hidden">

            <div className="p-4 text-center font-semibold border-b border-white/10">
              💜 Chatbot
            </div>

            <ChatMessages chatMessages={chatMessages} />

            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
